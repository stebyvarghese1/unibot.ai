<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... - Unibot.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }
        .loader { 
            border: 4px solid rgba(255, 255, 255, 0.1); 
            border-radius: 50%; 
            border-top: 4px solid #4f46e5; 
            width: 48px; 
            height: 48px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div class="text-center bg-slate-900/50 p-8 rounded-2xl border border-slate-800 backdrop-blur-sm max-w-sm w-full mx-4">
        <div class="loader mx-auto mb-6"></div>
        <h2 class="text-2xl font-bold mb-2">Authenticating...</h2>
        <p class="text-slate-400 text-sm" id="status-text">Please wait while we complete your sign in.</p>
    </div>

    <script>
        const supabaseUrl = '{{ config.SUPABASE_URL }}';
        const supabaseKey = '{{ config.SUPABASE_KEY }}';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // Check if we have hash parameters (Supabase OAuth usually redirects with a hash containing access_token)
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                
                let accessToken = null;
                
                if (hashParams.has('access_token')) {
                    accessToken = hashParams.get('access_token');
                } else {
                    // Try getting from session if hash is missing or already processed
                    const { data, error } = await supabaseClient.auth.getSession();
                    if (data && data.session) {
                        accessToken = data.session.access_token;
                    }
                }

                if (accessToken) {
                    await verifySession(accessToken);
                } else {
                    // Setup a listener in case the session is still being established
                    const { data: authListener } = supabaseClient.auth.onAuthStateChange(async (event, session) => {
                        if (event === 'SIGNED_IN' && session) {
                            await verifySession(session.access_token);
                            // Unsubscribe once we handle it
                            authListener.subscription.unsubscribe();
                        }
                    });
                    
                    // Fallback timeout in case auth state change doesn't fire
                    setTimeout(() => {
                        if (document.getElementById('status-text').innerText === 'Please wait while we complete your sign in.') {
                            document.getElementById('status-text').innerText = "No session found. Redirecting...";
                            setTimeout(() => window.location.href = '/login', 1500);
                        }
                    }, 3000);
                }
            } catch (err) {
                console.error("Auth callback error:", err);
                document.getElementById('status-text').innerText = "Authentication failed. Redirecting...";
                setTimeout(() => window.location.href = '/login', 2000);
            }
        });

        async function verifySession(accessToken) {
            try {
                const response = await fetch('/api/auth/verify-supabase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ access_token: accessToken })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('status-text').innerText = "Success! Redirecting...";
                    document.getElementById('status-text').className = "text-emerald-400 text-sm";
                    setTimeout(() => {
                        window.location.href = result.role === 'admin' ? '/admin' : '/chat';
                    }, 500);
                } else {
                    document.getElementById('status-text').innerText = result.error || "Verification failed.";
                    document.getElementById('status-text').className = "text-rose-400 text-sm";
                    setTimeout(() => window.location.href = '/login', 2500);
                }
            } catch (err) {
                console.error("Verification error:", err);
                document.getElementById('status-text').innerText = "Server connection error. Try again.";
                document.getElementById('status-text').className = "text-rose-400 text-sm";
                setTimeout(() => window.location.href = '/login', 2500);
            }
        }
    </script>
</body>
</html>
