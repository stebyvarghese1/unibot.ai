<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - University AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Typing Animation */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #6366f1;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Markdown Styles Optimization */
        .prose { color: inherit; line-height: 1.6; }
        .prose p { margin-bottom: 0.75rem; }
        .prose p:last-child { margin-bottom: 0; }
        .prose strong { font-weight: 800; color: #4f46e5; }
        .prose h3 {
            font-size: 1.1rem;
            font-weight: 800;
            color: #1e293b;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            padding-left: 0.75rem;
            border-left: 4px solid #6366f1;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #e2e8f0; border-radius: 20px; }

        .sidebar-transition {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 1024px) {
            .sidebar-closed { transform: translateX(-100%); }
            .sidebar-open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
        }

        /* Message Bubbles */
        .msg-bubble {
            max-width: 85%;
            transition: all 0.3s ease;
        }
        @media (max-width: 640px) { .msg-bubble { max-width: 95%; font-size: 0.95rem; } }

        /* Mode Toggle Pills */
        .mode-btn {
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }
        .mode-btn.active { color: white !important; }

        /* Dark Mode Extensions */
        .dark-mode { background-color: #0f172a !important; color: #f1f5f9 !important; }
        .dark-mode header, .dark-mode aside { background-color: #1e293b !important; border-color: #334155 !important; }
        .dark-mode #chat-container { background-color: #0f172a !important; }
        .dark-mode .bg-white { background-color: #1e293b !important; border-color: #334155 !important; }
        .dark-mode input { background-color: #0f172a !important; border-color: #334155 !important; color: white; }
    </style>
</head>

<body class="bg-gray-50 h-screen flex flex-col font-sans overflow-hidden transition-colors duration-500">
    <header id="app-header"
        class="bg-white/80 backdrop-blur-md border-b border-gray-100 z-40 flex-shrink-0 h-16 sm:h-20 transition-all duration-500 flex items-center">
        <div class="w-full px-4 sm:px-6 flex justify-between items-center gap-2">
            <div class="flex items-center gap-3">
                <button id="toggle-sidebar" class="p-2.5 hover:bg-gray-100 rounded-xl lg:hidden transition-colors"
                    aria-label="Toggle History">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                        <span id="header-icon" class="text-xl">🎓</span>
                    </div>
                    <span class="text-xl font-black text-gray-900 tracking-tighter hidden xs:block">Unibot.AI</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <button onclick="startNewChat()" id="new-chat-btn"
                    class="flex items-center gap-2 bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white py-2 px-3 sm:px-5 rounded-xl font-black text-xs sm:text-sm transition-all border border-indigo-100 shrink-0 uppercase tracking-wider">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
                    </svg>
                    <span class="hidden sm:inline">New Chat</span>
                </button>
                <div id="user-menu" class="flex items-center"></div>
            </div>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden relative">
        <!-- Sidebar: Chat History -->
        <aside id="sidebar"
            class="sidebar-transition sidebar-closed lg:translate-x-0 w-80 lg:w-72 bg-white border-r border-gray-100 flex flex-col absolute lg:relative inset-y-0 left-0 z-50">
            <div class="p-5 border-b border-gray-50 flex items-center justify-between">
                <span class="text-xs font-black text-gray-400 uppercase tracking-widest">History</span>
                <button class="lg:hidden p-2 text-gray-400 hover:text-gray-900 transition-colors" onclick="toggleSidebar()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="flex-grow overflow-y-auto custom-scrollbar p-3 space-y-1" id="session-list">
                <div class="flex items-center justify-center h-20 text-gray-300 text-xs font-bold uppercase tracking-tighter">
                    Fetching history...
                </div>
            </div>
            <div id="dynamic-user-menu" class="p-3 border-t border-gray-50 flex flex-col gap-1"></div>
            <div class="p-5 border-t border-gray-50 text-[10px] font-bold text-gray-300 uppercase tracking-widest text-center">
                Powered by University AI
            </div>
        </aside>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity duration-300 opacity-0"></div>

        <!-- Main Chat -->
        <main id="chat-container" class="flex-grow flex flex-col relative w-full bg-slate-50 overflow-hidden">
            <div id="chat-history" class="flex-grow overflow-y-auto p-4 md:p-10 scroll-smooth flex flex-col gap-6">
                <!-- Welcome State -->
                <div id="welcome-message" class="h-full flex flex-col items-center justify-center text-center opacity-40 py-10">
                    <div class="w-24 h-24 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mb-6 animate-pulse">
                        <span id="welcome-icon" class="text-5xl">📚</span>
                    </div>
                    <h2 id="welcome-text" class="text-2xl font-black text-slate-800 tracking-tight mb-2">Academic Assistant</h2>
                    <p id="welcome-sub" class="text-sm font-bold text-slate-500 max-w-xs leading-relaxed uppercase tracking-tighter">Enter a subject or question below to start learning.</p>
                </div>
            </div>

            <!-- Sticky Bottom Area -->
            <div class="bg-white/80 backdrop-blur-xl border-t border-gray-100 p-3 sm:p-6 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] z-10">
                <div class="max-w-4xl mx-auto flex flex-col gap-4">
                    <form id="chat-form" class="flex flex-col gap-3">
                        <!-- Controls Row -->
                        <div class="flex flex-wrap items-center gap-3">
                            <!-- Toggle -->
                            <div class="bg-gray-100 p-1 rounded-xl flex items-center">
                                <button type="button" id="mode-studies" onclick="setMode('studies')"
                                    class="mode-btn px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all">Studies</button>
                                <button type="button" id="mode-general" onclick="setMode('general')"
                                    class="mode-btn px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all">General</button>
                            </div>
                            
                            <!-- Filter -->
                            <div id="subject-filter-container" class="flex-grow max-w-[200px]">
                                <select id="subject-select"
                                    class="w-full h-9 px-3 bg-gray-50 border border-gray-200 rounded-xl text-[10px] font-black uppercase tracking-tighter focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                                    <option value="">Subject: All</option>
                                </select>
                            </div>
                        </div>

                        <!-- Input Area -->
                        <div class="flex items-end gap-2 sm:gap-4 relative">
                            <div class="relative flex-grow">
                                <textarea id="question-input" rows="1"
                                    class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl sm:rounded-3xl pl-5 sm:pl-7 pr-12 py-3.5 sm:py-5 focus:border-indigo-500 focus:bg-white transition-all outline-none font-medium text-slate-700 resize-none min-h-[56px] sm:min-h-[72px] max-h-48 overflow-y-auto"
                                    placeholder="Ask anything..." required></textarea>
                            </div>
                            <button type="submit" id="send-btn"
                                class="w-14 h-14 sm:w-[72px] sm:h-[72px] bg-indigo-600 text-white rounded-2xl sm:rounded-3xl hover:bg-indigo-700 hover:scale-105 active:scale-95 transition-all flex items-center justify-center shadow-lg shadow-indigo-100">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                                </svg>
                            </button>
                        </div>
                    </form>
                    <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest text-center">Unibot.AI can make mistakes. Verify important information.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- State ---
        let currentSessionId = null;
        let allFilters = [];
        let userPrefs = { course: '', semester: '', subject: '' };
        let isFirstMessageInSession = true;

        // --- Utils ---
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // --- Sidebar Logic ---
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const toggleBtn = document.getElementById('toggle-sidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('sidebar-closed');
            overlay.classList.toggle('hidden');
        }

        if (toggleBtn) toggleBtn.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);

        // --- Session Management ---
        const sessionList = document.getElementById('session-list');

        async function loadSessions() {
            try {
                const r = await fetch('/api/chat/sessions');
                const sessions = await r.json();
                renderSessions(sessions);
            } catch (e) { console.error('Failed to load sessions', e); }
        }

        function renderSessions(sessions) {
            if (!sessionList) return;
            if (sessions.length === 0) {
                sessionList.innerHTML = '<div class="text-center py-8 text-gray-400 text-sm">No recent chats</div>';
                return;
            }

            sessionList.innerHTML = '';

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            const sevenDaysAgo = new Date(today);
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

            const groups = {
                'Today': [],
                'Yesterday': [],
                'Previous 7 Days': [],
                'Older': []
            };

            sessions.forEach(s => {
                const updated = new Date(s.updated_at);
                if (updated >= today) groups['Today'].push(s);
                else if (updated >= yesterday) groups['Yesterday'].push(s);
                else if (updated >= sevenDaysAgo) groups['Previous 7 Days'].push(s);
                else groups['Older'].push(s);
            });

            Object.entries(groups).forEach(([label, groupSessions]) => {
                if (groupSessions.length === 0) return;

                const header = document.createElement('div');
                header.className = 'px-3 pt-6 pb-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest';
                header.textContent = label;
                sessionList.appendChild(header);

                groupSessions.forEach(s => {
                    const item = document.createElement('div');
                    const isActive = s.id === currentSessionId;
                    item.className = `session-item group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all ${isActive ? 'session-active font-bold border-indigo-200 shadow-sm' : 'hover:bg-gray-50 text-gray-600'}`;
                    item.onclick = (e) => {
                        if (e.target.closest('.session-actions')) return;
                        setSession(s.id);
                    };

                    item.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0 ${isActive ? 'text-indigo-600' : 'text-gray-400'}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                            </svg>
                            <span class="truncate text-sm pr-2">${s.title || 'New Chat'}</span>
                        </div>
                        <div class="session-actions opacity-0 flex items-center gap-1 group-hover:opacity-100 transition-opacity">
                            <button onclick="renameSession('${s.id}', '${s.title}')" class="p-1 hover:text-indigo-600 rounded" title="Rename">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                            </button>
                            <button onclick="deleteSession('${s.id}')" class="p-1 hover:text-rose-600 rounded" title="Delete">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    `;
                    sessionList.appendChild(item);
                });
            });
        }

        async function setSession(sessionId) {
            if (currentSessionId === sessionId) return;
            currentSessionId = sessionId;
            isFirstMessageInSession = false;

            // Close sidebar on mobile
            if (window.innerWidth < 1024) {
                sidebar.classList.add('sidebar-closed');
                overlay.classList.add('hidden');
            }

            // Show loading
            chatHistory.innerHTML = '<div class="flex items-center justify-center h-full text-indigo-400 font-medium">Loading conversation...</div>';

            try {
                const r = await fetch(`/api/chat/sessions/${sessionId}`);
                const msgs = await r.json();

                chatHistory.innerHTML = '';
                if (msgs.length === 0) {
                    const icon = chatMode === 'studies' ? '📚' : '🧭';
                    chatHistory.innerHTML = `<div id="welcome-message" class="h-full flex flex-col items-center justify-center text-center text-gray-400 opacity-60"><div class="text-6xl mb-4">${icon}</div><p class="text-lg font-medium">Empty Chat</p></div>`;
                } else {
                    msgs.forEach(m => {
                        appendMessage('user', m.question, false, [], true);

                        let sources = m.sources;
                        if (typeof sources === 'string') {
                            try {
                                sources = JSON.parse(sources || '[]');
                            } catch (e) {
                                console.error('Failed to parse sources for message', m.id, e);
                                sources = [];
                            }
                        }
                        appendMessage('bot', m.answer, false, m.sources || [], true, m.id, m.feedback);
                    });
                }
                loadSessions(); // Refresh active state
            } catch (e) {
                chatHistory.innerHTML = '<div class="flex items-center justify-center h-full text-rose-400">Error loading history</div>';
            }
        }

        async function deleteSession(id) {
            if (!confirm('Are you sure you want to delete this chat?')) return;
            try {
                await fetch(`/api/chat/sessions/${id}`, { method: 'DELETE' });
                if (currentSessionId === id) {
                    startNewChat();
                } else {
                    loadSessions();
                }
            } catch (e) { console.error(e); }
        }

        async function renameSession(id, oldTitle) {
            const title = prompt('New title:', oldTitle);
            if (!title) return;
            try {
                await fetch(`/api/chat/sessions/${id}/rename`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                loadSessions();
            } catch (e) { console.error(e); }
        }

        function startNewChat() {
            currentSessionId = generateUUID();
            isFirstMessageInSession = true;

            // Close sidebar on mobile
            if (window.innerWidth < 1024) {
                sidebar.classList.add('sidebar-closed');
                overlay.classList.add('hidden');
            }

            const icon = chatMode === 'studies' ? '📚' : '🧭';
            const text = chatMode === 'studies' ? 'Academic Knowledge Base' : 'Explorer Mode';
            const sub = chatMode === 'studies' ? 'Ask about your courses, subjects and semester files.' : 'Search the general website, schedules, and more.';

            chatHistory.innerHTML = `
            <div id="welcome-message" class="h-full flex flex-col items-center justify-center text-center text-gray-400 opacity-60">
                <div id="welcome-icon" class="text-6xl mb-4 transition-all duration-500 transform scale-100">${icon}</div>
                <p id="welcome-text" class="text-lg font-medium">${text}</p>
                <p id="welcome-sub" class="text-sm">${sub}</p>
            </div>`;
            loadSessions();
        }

        // --- Auth & Init ---
        async function authGate() {
            try {
                const r = await fetch('/api/check-auth');
                const auth = await r.json();
                if (!auth.authenticated) {
                    window.location.href = '/login';
                    return;
                }
                document.getElementById('dynamic-user-menu').innerHTML = `
                <a href="/profile" class="w-full px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-indigo-600 rounded-xl hover:bg-gray-50 transition-colors flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    </div>
                    My Profile
                </a>
                <div class="theme-switch-wrapper group px-3 py-2 hover:bg-gray-50 dark-mode:hover:bg-slate-800/50 transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-amber-50 dark-mode:bg-amber-900/30 flex items-center justify-center text-amber-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 block dark-mode:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" /></svg>
                        </div>
                        <span class="text-sm font-medium text-gray-600">Dark Mode</span>
                    </div>
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" onchange="toggleDarkMode()">
                        <div class="slider round"></div>
                    </label>
                </div>
                <button id="logout" type="button" class="group w-full px-3 py-2.5 text-sm font-semibold text-rose-500 hover:text-rose-600 rounded-xl hover:bg-rose-50 transition-all flex items-center gap-3 text-left">
                    <div class="w-8 h-8 rounded-full bg-rose-50 group-hover:bg-rose-100 flex items-center justify-center text-rose-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                    </div>
                    Log out
                </button>`;

                // Check for saved theme
                const currentTheme = localStorage.getItem('theme');
                if (currentTheme === 'dark') {
                    document.body.classList.add('dark-mode');
                    document.getElementById('checkbox').checked = true;
                }

                document.getElementById('logout').addEventListener('click', async () => {
                    await fetch('/api/logout', { method: 'POST' });
                    window.location.href = '/login';
                });

                setMode('studies');
                startNewChat();
                loadSessions();
            } catch (e) { console.error(e); }
        }
        authGate();

        function toggleDarkMode() {
            const isChecked = document.getElementById('checkbox').checked;
            if (isChecked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        }

        // --- DOM ---
        const chatForm = document.getElementById('chat-form');
        const chatHistory = document.getElementById('chat-history');
        const questionInput = document.getElementById('question-input');

        const subjectSelect = document.getElementById('subject-select');
        let chatMode = 'studies'; // default
        const filtersRow = document.getElementById('chat-filters-row');

        // Mode switching
        function setMode(mode) {
            chatMode = mode;
            const btnStudies = document.getElementById('mode-studies');
            const btnGeneral = document.getElementById('mode-general');
            const subjContainer = document.getElementById('subject-filter-container');
            const header = document.getElementById('app-header');
            const headerIcon = document.getElementById('header-icon');
            const welcomeIcon = document.getElementById('welcome-icon');
            const welcomeText = document.getElementById('welcome-text');
            const welcomeSub = document.getElementById('welcome-sub');

            if (!btnStudies || !btnGeneral) return;

            // Reset classes
            [btnStudies, btnGeneral].forEach(b => {
                b.className = 'mode-btn px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all text-gray-400 hover:text-gray-600';
            });

            if (mode === 'studies') {
                document.body.classList.remove('mode-general');
                btnStudies.classList.add('bg-indigo-600', 'text-white', 'active', 'shadow-sm');
                headerIcon.innerText = '🎓';
                if (subjContainer) subjContainer.style.display = 'block';
                if (questionInput) questionInput.placeholder = 'Ask about your studies...';
                if (welcomeIcon) {
                    welcomeIcon.innerText = '📚';
                    welcomeText.innerText = 'Academic Assistant';
                    welcomeSub.innerText = 'Enter a subject or question below to start learning.';
                }
            } else {
                document.body.classList.add('mode-general');
                btnGeneral.classList.add('bg-emerald-500', 'text-white', 'active', 'shadow-sm');
                headerIcon.innerText = '🌐';
                if (subjContainer) subjContainer.style.display = 'none';
                if (questionInput) questionInput.placeholder = 'Ask anything (Web search)...';
                if (welcomeIcon) {
                    welcomeIcon.innerText = '🧭';
                    welcomeText.innerText = 'Explorer Mode';
                    welcomeSub.innerText = 'Search the general website, schedules, and more.';
                }
            }
        }

        // --- Filters Logic ---
        function getSubjectsForPrefs() {
            const course = userPrefs.course;
            const semester = userPrefs.semester;
            if (!course || !semester) {
                return allFilters.filter(x => x.category === 'subject' && x.value).sort((a, b) => (a.value || '').localeCompare(b.value || ''));
            }
            const courseObj = allFilters.find(x => x.category === 'course' && x.value === course);
            const semObj = courseObj ? allFilters.find(x => x.category === 'semester' && x.value === semester && x.parent_id === courseObj.id) : null;
            if (!semObj) {
                return allFilters.filter(x => x.category === 'subject' && x.value).sort((a, b) => (a.value || '').localeCompare(b.value || ''));
            }
            return allFilters.filter(x => x.category === 'subject' && x.parent_id === semObj.id && x.value).sort((a, b) => (a.value || '').localeCompare(b.value || ''));
        }

        async function loadFilters() {
            try {
                const [fRes, pRes] = await Promise.all([fetch('/api/filters'), fetch('/api/prefs')]);
                const filterData = await fRes.json();
                const prefsData = await pRes.json();
                allFilters = filterData.all || [];
                userPrefs = {
                    course: (prefsData.course || '').trim(),
                    semester: (prefsData.semester || '').trim(),
                    subject: (prefsData.subject || '').trim()
                };
                const subjects = getSubjectsForPrefs();
                if (subjectSelect) {
                    populateSelect(subjectSelect, subjects, 'Subject');
                    if (userPrefs.subject) subjectSelect.value = userPrefs.subject;
                    subjectSelect.addEventListener('change', function saveSubjectPref() {
                        var subj = subjectSelect.value || '';
                        if (subj === userPrefs.subject) return;
                        userPrefs.subject = subj;
                        fetch('/api/prefs', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ course: userPrefs.course, semester: userPrefs.semester, subject: subj }) }).catch(function () { });
                    });
                }
            } catch (e) { console.error(e); }
        }

        function populateSelect(el, items, placeholder) {
            if (!el) return;
            el.innerHTML = `<option value="">${placeholder}</option>`;
            items.forEach(i => {
                const opt = document.createElement('option');
                opt.value = i.value;
                opt.textContent = i.value;
                opt.dataset.id = i.id;
                el.appendChild(opt);
            });
        }
        loadFilters();

        // --- Chat UI Logic ---
        function typeMessage(element, text, speed = 10, onComplete) {
            const fullHtml = marked.parse(text);
            let p = 0;
            function type() {
                if (p < fullHtml.length) {
                    let char = fullHtml.charAt(p);
                    let jump = 1;
                    if (char === '<') {
                        let tagEnd = fullHtml.indexOf('>', p);
                        if (tagEnd !== -1) jump = tagEnd - p + 1;
                    } else if (char === '&') {
                        let entityEnd = fullHtml.indexOf(';', p);
                        if (entityEnd !== -1 && entityEnd - p < 10) jump = entityEnd - p + 1;
                    }
                    p += jump;
                    element.innerHTML = fullHtml.slice(0, p);
                    chatHistory.scrollTo({ top: chatHistory.scrollHeight, behavior: 'auto' });
                    setTimeout(type, speed);
                } else {
                    element.innerHTML = fullHtml;
                    chatHistory.scrollTo({ top: chatHistory.scrollHeight, behavior: 'smooth' });
                    if (onComplete) onComplete();
                }
            }
            type();
        }

        function appendMessage(sender, text, isLoading = false, sources = [], skipTyping = false, msgId = null, existingFeedback = null) {
            const welcome = document.getElementById('welcome-message');
            if (welcome) welcome.remove();

            const row = document.createElement('div');
            row.className = `mb-6 flex w-full group ${sender === 'user' ? 'justify-end' : 'justify-start'} fade-in`;

            if (isLoading) {
                row.classList.add('thinking-container');
                row.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center mr-2 flex-shrink-0 text-lg">🤖</div>
                    <div class="max-w-[80%] rounded-2xl rounded-tl-none px-4 py-3 bg-gray-50 border border-gray-100 shadow-sm">
                        <div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
                    </div>`;
                chatHistory.appendChild(row);
                chatHistory.scrollTop = chatHistory.scrollHeight;
                return;
            }

            if (sender === 'user') {
                const escapedText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                row.innerHTML = `<div class="msg-bubble rounded-2xl sm:rounded-3xl rounded-br-none px-5 py-3.5 bg-indigo-600 text-white shadow-xl shadow-indigo-100 font-medium">${escapedText}</div>`;
            } else {
                const avatar = document.createElement('div');
                avatar.className = `w-9 h-9 rounded-xl bg-indigo-50 flex items-center justify-center mr-3 flex-shrink-0 text-lg select-none shadow-sm`;
                avatar.innerText = '🤖';
                row.appendChild(avatar);

                const bubble = document.createElement('div');
                bubble.id = msgId ? `msg-${msgId}` : null;
                bubble.className = `msg-bubble rounded-2xl sm:rounded-3xl rounded-tl-none px-5 py-5 bg-white border border-gray-100 shadow-sm text-slate-800 flex flex-col`;

                const contentDiv = document.createElement('div');
                contentDiv.className = 'prose prose-blue max-w-none transition-all duration-300';
                bubble.appendChild(contentDiv);
                
                // Add Action Buttons Row
                const actionsRow = document.createElement('div');
                actionsRow.className = 'message-actions mt-3 pt-2 border-t border-gray-100 flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300';
                
                // Helper to send feedback
                async function sendFeedback(id, type) {
                    if (!id) return;
                    try {
                        await fetch(`/api/chat/message/${id}/feedback`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ feedback: type })
                        });
                    } catch (e) { console.error('Feedback failed', e); }
                }

                // Helper to create action button
                const createBtn = (html, title, onClick, colorClass) => {
                    const btn = document.createElement('button');
                    btn.className = `p-1 px-2 hover:bg-white rounded-lg text-xs flex items-center gap-1.5 text-gray-400 transition-all duration-200 border border-transparent hover:border-gray-200 hover:shadow-sm ${colorClass}`;
                    btn.title = title;
                    btn.innerHTML = html;
                    btn.onclick = (e) => { e.stopPropagation(); onClick(btn); };
                    return btn;
                };

                const likeBtn = createBtn('<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/></svg>', 'Helpful', async (b) => {
                    const isLiked = b.classList.contains('text-indigo-600');
                    // Reset both
                    likeBtn.classList.remove('text-indigo-600', 'bg-white', 'border-indigo-200');
                    dislikeBtn.classList.remove('text-rose-600', 'bg-white', 'border-rose-200');
                    
                    if (!isLiked) {
                        b.classList.add('text-indigo-600', 'bg-white', 'border-indigo-200');
                        await sendFeedback(msgId, 'like');
                    } else {
                        await sendFeedback(msgId, null);
                    }
                }, 'hover:text-indigo-600');

                const dislikeBtn = createBtn('<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: scaleY(-1);"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/></svg>', 'Not helpful', async (b) => {
                    const isDisliked = b.classList.contains('text-rose-600');
                    likeBtn.classList.remove('text-indigo-600', 'bg-white', 'border-indigo-200');
                    dislikeBtn.classList.remove('text-rose-600', 'bg-white', 'border-rose-200');
                    
                    if (!isDisliked) {
                        b.classList.add('text-rose-600', 'bg-white', 'border-rose-200');
                        await sendFeedback(msgId, 'dislike');
                    } else {
                        await sendFeedback(msgId, null);
                    }
                }, 'hover:text-rose-600');
                
                // Existing feedback state
                if (existingFeedback === 'like') likeBtn.classList.add('text-indigo-600', 'bg-white', 'border-indigo-200');
                if (existingFeedback === 'dislike') dislikeBtn.classList.add('text-rose-600', 'bg-white', 'border-rose-200');

                const reloadBtn = createBtn('<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>', 'Regenerate', () => {
                   const lastUserMsg = row.previousElementSibling;
                   if (lastUserMsg && lastUserMsg.innerText) {
                       questionInput.value = lastUserMsg.innerText;
                       chatForm.dispatchEvent(new Event('submit'));
                   }
                }, 'hover:text-amber-600');

                const copyBtn = createBtn('<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>', 'Copy', (b) => {
                    navigator.clipboard.writeText(text);
                    const original = b.innerHTML;
                    b.innerHTML = '<span class="text-[10px] font-bold">COPIED!</span>';
                    setTimeout(() => b.innerHTML = original, 2000);
                }, 'hover:text-emerald-600');

                actionsRow.appendChild(likeBtn);
                actionsRow.appendChild(dislikeBtn);
                const divider = document.createElement('div'); divider.className = 'h-3 w-[1px] bg-gray-200 mx-1'; actionsRow.appendChild(divider);
                actionsRow.appendChild(reloadBtn);
                actionsRow.appendChild(copyBtn);
                bubble.appendChild(actionsRow);

                row.appendChild(bubble);

                const renderSources = () => {
                    if (Array.isArray(sources) && sources.length === 0) return;
                    const existingSrc = bubble.querySelector('.source-container');
                    if (existingSrc) existingSrc.remove();

                    const unique = new Map();
                    sources.forEach(s => {
                        const key = s.doc_id || s.url || s.filename || Math.random();
                        unique.set(key, s);
                    });
                    const n = unique.size;
                    const srcContainer = document.createElement('div');
                    srcContainer.className = 'source-container mt-3 pt-2 border-t border-gray-100 text-xs text-gray-500';
                    const summary = document.createElement('button');
                    summary.type = 'button';
                    summary.className = 'inline-flex items-center gap-1 text-gray-500 hover:text-indigo-600 transition-colors cursor-pointer bg-transparent border-0 p-0';
                    summary.innerHTML = '<span class="text-[10px] font-medium uppercase tracking-wide">+ ' + n + ' source' + (n !== 1 ? 's' : '') + '</span>';
                    const listWrap = document.createElement('div');
                    listWrap.className = 'source-list hidden mt-2 space-y-1';
                    unique.forEach(s => {
                        const label = s.filename || (s.url ? 'External Link' : `Document ${s.doc_id}`);
                        const item = document.createElement('div');
                        item.className = 'truncate flex items-center gap-1';
                        if (s.url) item.innerHTML = '<a href="' + s.url + '" target="_blank" class="text-blue-500 hover:underline hover:text-blue-700">' + (label || '').replace(/</g, '&lt;') + '</a>';
                        else item.innerHTML = '<span>' + (label || '').replace(/</g, '&lt;') + '</span>';
                        listWrap.appendChild(item);
                    });
                    summary.addEventListener('click', () => listWrap.classList.toggle('hidden'));
                    srcContainer.appendChild(summary);
                    srcContainer.appendChild(listWrap);
                    
                    // Insert BEFORE actions row
                    bubble.insertBefore(srcContainer, actionsRow);
                    chatHistory.scrollTo({ top: chatHistory.scrollHeight, behavior: 'smooth' });
                };

                if (skipTyping) {
                    contentDiv.innerHTML = marked.parse(text);
                    renderSources();
                    actionsRow.classList.remove('opacity-0'); // Show always if from history
                } else {
                    typeMessage(contentDiv, text, text.length > 200 ? 0 : 8, () => {
                        renderSources();
                        actionsRow.classList.remove('opacity-0');
                        actionsRow.classList.add('fade-in');
                    });
                }
            }
            chatHistory.appendChild(row);
            setTimeout(() => chatHistory.scrollTo({ top: chatHistory.scrollHeight, behavior: 'smooth' }), 50);
        }

        // --- Submit ---
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            appendMessage('user', question);
            questionInput.value = '';
            appendMessage('bot', '', true);

            if (!currentSessionId) currentSessionId = generateUUID();

            // Animate Send Button
            const sendBtn = document.getElementById('send-btn');
            const originalIcon = sendBtn.innerHTML;
            sendBtn.classList.add('btn-loading');
            sendBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="w-5 h-5"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        mode: chatMode,
                        course: chatMode === 'studies' ? (userPrefs.course || '') : '',
                        semester: chatMode === 'studies' ? (userPrefs.semester || '') : '',
                        subject: chatMode === 'studies' && subjectSelect ? (subjectSelect.value || '') : '',
                        session_id: currentSessionId
                    })
                });
                const data = await response.json();

                const thinkers = chatHistory.querySelectorAll('.thinking-container');
                thinkers.forEach(el => el.remove());

                // Reset Button
                sendBtn.classList.remove('btn-loading');
                sendBtn.innerHTML = originalIcon;

                if (response.ok) {
                    appendMessage('bot', data.answer, false, data.sources || [], false, data.message_id);

                    // Update session ID if server returned a different one
                    if (data.session_id && currentSessionId !== data.session_id) {
                        currentSessionId = data.session_id;
                    }

                    if (isFirstMessageInSession) {
                        isFirstMessageInSession = false;
                        loadSessions(); // Reload sidebar immediately to show new session
                    }
                } else {
                    appendMessage('bot', '**Error:** ' + (data.error || 'Something went wrong.'));
                }
            } catch (error) {
                const thinkers = chatHistory.querySelectorAll('.thinking-container');
                thinkers.forEach(el => el.remove());
                
                // Reset Button
                sendBtn.classList.remove('btn-loading');
                sendBtn.innerHTML = originalIcon;
                
                // --- Textarea Auto-resize ---
        if (questionInput) {
            questionInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
            // Handle Enter key for submit (Shift+Enter for new line)
            questionInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    chatForm.dispatchEvent(new Event('submit'));
                }
            });
        }

        // --- Sidebar Logic ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
            setTimeout(() => overlay.classList.toggle('opacity-0'), 10);
        }

        const toggleBtn = document.getElementById('toggle-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (toggleBtn) toggleBtn.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);

        // Update send logic to reset textarea height
        const originalSetSession = setSession;
        setSession = async function(id) {
            await originalSetSession(id);
            if (window.innerWidth < 1024) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                sidebar.classList.add('sidebar-closed');
                sidebar.classList.remove('sidebar-open');
                overlay.classList.add('hidden', 'opacity-0');
            }
        };

        const originalChatSubmit = chatForm.onsubmit; // Wait, it's an event listener
    </script>
