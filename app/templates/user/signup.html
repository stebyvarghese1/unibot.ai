<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Unibot.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-toggle-active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .panel-container {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Ambient background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(50px, 50px); }
        }

        #login-error, #signup-error {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>

<body class="p-4 sm:p-8">
    <div class="ambient-bg">
        <div class="blob bg-indigo-600 -top-20 -left-20"></div>
        <div class="blob bg-purple-600 -bottom-20 -right-20" style="animation-delay: -5s;"></div>
    </div>

    <div class="glass-card w-full max-w-[440px] rounded-[2.5rem] p-8 sm:p-12 animate-in fade-in zoom-in duration-500">
        <!-- Brand -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-xl mb-4">
                <span class="text-3xl">🎓</span>
            </div>
            <h1 class="text-3xl font-extrabold text-[#111827] tracking-tight">Unibot.AI</h1>
            <p class="text-slate-600 font-semibold mt-1">Academic Intelligence Platform</p>
        </div>

        <!-- Switcher -->
        <div class="bg-slate-100 p-1 rounded-2xl flex items-center mb-8">
            <button id="btn-login" onclick="switchPanel('login')"
                class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 auth-toggle-active">Sign In</button>
            <button id="btn-register" onclick="switchPanel('register')"
                class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 text-slate-600">Sign Up</button>
        </div>

        <div class="relative overflow-hidden min-h-[380px]">
            <div id="panels" class="panel-container flex">
                <!-- Login -->
                <div class="w-full shrink-0">
                    <form id="login-form" class="space-y-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-slate-800 ml-1">Email</label>
                            <input type="email" id="login-email" placeholder="name@university.edu"
                                class="w-full px-5 py-3.5 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center px-1">
                                <label class="block text-sm font-bold text-slate-800">Password</label>
                                <a href="#" class="text-xs font-bold text-indigo-700 hover:text-indigo-800 transition-colors">Forgot?</a>
                            </div>
                            <input type="password" id="login-password" placeholder="••••••••"
                                class="w-full px-5 py-3.5 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div id="login-error" class="bg-rose-50 text-rose-600 text-xs font-bold p-4 rounded-2xl border border-rose-100 hidden"></div>
                        <button type="submit" class="w-full py-3.5 bg-[#0f172a] text-white rounded-2xl font-bold text-base shadow-lg hover:bg-slate-800 transition-all active:scale-95">
                            Sign In
                        </button>
                    </form>
                </div>

                <!-- Signup -->
                <div class="w-full shrink-0">
                    <form id="signup-form" class="space-y-5">
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-slate-800 ml-1">Email</label>
                            <input type="email" id="signup-email" placeholder="name@university.edu"
                                class="w-full px-5 py-3.5 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-slate-800 ml-1">Password</label>
                            <input type="password" id="signup-password" placeholder="Min. 8 characters"
                                class="w-full px-5 py-3.5 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-slate-800 ml-1">Confirm</label>
                            <input type="password" id="signup-confirm" placeholder="Match passwords"
                                class="w-full px-5 py-3.5 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div id="signup-error" class="bg-rose-50 text-rose-600 text-xs font-bold p-4 rounded-2xl border border-rose-100 hidden"></div>
                        <div class="flex justify-center pt-2">
                            <button type="submit" class="px-12 py-3.5 bg-[#0f172a] text-white rounded-2xl font-bold text-base shadow-lg hover:bg-slate-800 transition-all active:scale-95">
                                Create Account
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <p class="text-center mt-10 text-slate-400 text-xs font-medium">
            By joining, you agree to our <a href="#" class="text-slate-900 font-bold hover:underline">Terms</a>
        </p>
    </div>

    <script>
        const panels = document.getElementById('panels');
        const btnLogin = document.getElementById('btn-login');
        const btnRegister = document.getElementById('btn-register');

        function switchPanel(mode) {
            if (mode === 'login') {
                panels.style.transform = 'translateX(0%)';
                btnLogin.className = 'flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 auth-toggle-active';
                btnRegister.className = 'flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 text-slate-600';
                document.title = "Sign In - Unibot.AI";
                if (window.location.pathname.includes('signup')) window.history.pushState({}, '', '/login');
            } else {
                panels.style.transform = 'translateX(-100%)';
                btnRegister.className = 'flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 auth-toggle-active';
                btnLogin.className = 'flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 text-slate-600';
                if (!window.location.pathname.includes('signup')) window.history.pushState({}, '', '/signup');
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            if (window.location.pathname.includes('signup')) switchPanel('register');
        });

        // Forms logic...
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = 'Signing in...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) { window.location.href = data.role === 'admin' ? '/admin' : '/chat'; }
                else { 
                    errorMsg.innerText = data.error || 'Login failed'; 
                    errorMsg.classList.remove('hidden'); 
                    btn.disabled = false; btn.innerText = 'Sign In';
                }
            } catch (err) { 
                errorMsg.innerText = 'Error connecting to server'; 
                errorMsg.classList.remove('hidden'); 
                btn.disabled = false; btn.innerText = 'Sign In';
            }
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const errorMsg = document.getElementById('signup-error');
            const btn = e.target.querySelector('button');

            if (password !== confirm) { errorMsg.innerText = 'Passwords not matching'; errorMsg.classList.remove('hidden'); return; }
            
            btn.disabled = true; btn.innerText = 'Creating account...';
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) { window.location.href = '/chat'; }
                else { 
                    errorMsg.innerText = data.error || 'Signup failed'; 
                    errorMsg.classList.remove('hidden'); 
                    btn.disabled = false; btn.innerText = 'Create Account';
                }
            } catch (err) { 
                errorMsg.innerText = 'Error connecting to server'; 
                errorMsg.classList.remove('hidden'); 
                btn.disabled = false; btn.innerText = 'Create Account';
            }
        });
    </script>
</body>

</html>
