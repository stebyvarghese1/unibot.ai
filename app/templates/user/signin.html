<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Welcome - Unibot.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-toggle-active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .panel-container {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Ambient background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(50px, 50px); }
        }

        #login-error, #signup-error {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>

<body class="p-4 sm:p-8">
    <div class="ambient-bg">
        <div class="blob bg-indigo-600 -top-20 -left-20"></div>
        <div class="blob bg-purple-600 -bottom-20 -right-20" style="animation-delay: -5s;"></div>
    </div>

    <div class="glass-card w-full max-w-[440px] rounded-[2.5rem] p-6 sm:p-8 animate-in fade-in zoom-in duration-500">
        <!-- Brand -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl shadow-xl mb-3">
                <span class="text-2xl">🎓</span>
            </div>
            <h1 class="text-2xl font-extrabold text-[#111827] tracking-tight">Unibot.AI</h1>
            <p class="text-slate-600 text-sm font-semibold mt-0.5">Academic Intelligence Platform</p>
        </div>

        <!-- Switcher -->
        <div class="bg-slate-100 p-1 rounded-2xl flex items-center mb-5">
            <button id="btn-login" onclick="switchPanel('login')"
                class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 auth-toggle-active">Sign In</button>
            <button id="btn-register" onclick="switchPanel('register')"
                class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 text-slate-600">Sign Up</button>
        </div>

        <div class="relative overflow-hidden min-h-[320px]">
            <div id="panels" class="panel-container flex">
                <!-- Login -->
                <div class="w-full shrink-0">
                    <form id="login-form" class="space-y-4">
                        <div class="space-y-1.5">
                            <label class="block text-xs font-bold text-slate-800 ml-1">Email</label>
                            <input type="email" id="login-email" placeholder="name@university.edu"
                                class="w-full px-5 py-3 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div class="space-y-1.5">
                            <div class="flex justify-between items-center px-1">
                                <label class="block text-xs font-bold text-slate-800">Password</label>
                            </div>
                            <input type="password" id="login-password" placeholder="••••••••"
                                class="w-full px-5 py-3 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div id="login-error" class="bg-rose-50 text-rose-600 text-xs font-bold p-3 rounded-2xl border border-rose-100 hidden"></div>
                        <div class="flex justify-center pt-1">
                            <button type="submit" class="px-12 py-3 bg-[#0f172a] text-white rounded-2xl font-bold text-sm shadow-lg hover:bg-slate-800 transition-all active:scale-95">
                                Sign In
                            </button>
                        </div>
                    </form>

                    <!-- Divider -->
                    <div class="relative my-4">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-slate-200"></div>
                        </div>
                        <div class="relative flex justify-center text-[10px] uppercase">
                            <span class="bg-white px-3 text-slate-400 font-bold tracking-wider">Or continue with</span>
                        </div>
                    </div>

                    <!-- Google Auth -->
                    <button id="google-login-btn" onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-3 py-3 bg-white border-2 border-slate-100 text-slate-700 rounded-2xl font-bold text-sm shadow-sm hover:bg-slate-50 hover:border-slate-200 transition-all active:scale-[0.98]">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                </div>

                <!-- Signup -->
                <div class="w-full shrink-0">
                    <form id="signup-form" class="space-y-4">
                        <div class="space-y-1.5">
                            <label class="block text-xs font-bold text-slate-800 ml-1">Email</label>
                            <input type="email" id="signup-email" placeholder="name@university.edu"
                                class="w-full px-5 py-3 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-xs font-bold text-slate-800 ml-1">Password</label>
                            <input type="password" id="signup-password" placeholder="Min. 8 characters"
                                class="w-full px-5 py-3 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-xs font-bold text-slate-800 ml-1">Confirm</label>
                            <input type="password" id="signup-confirm" placeholder="Match passwords"
                                class="w-full px-5 py-3 bg-white border-2 border-slate-100 rounded-2xl focus:border-indigo-600 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-gray-900 placeholder:text-slate-400 font-medium"
                                required>
                        </div>
                        <div id="signup-error" class="bg-rose-50 text-rose-600 text-xs font-bold p-3 rounded-2xl border border-rose-100 hidden"></div>
                        <button type="submit" class="w-full py-3 bg-[#0f172a] text-white rounded-2xl font-bold text-sm shadow-lg hover:bg-slate-800 transition-all active:scale-95">
                            Create Account
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="relative my-4">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-slate-200"></div>
                        </div>
                        <div class="relative flex justify-center text-[10px] uppercase">
                            <span class="bg-white px-3 text-slate-400 font-bold tracking-wider">Or continue with</span>
                        </div>
                    </div>

                    <!-- Google Auth -->
                    <button id="google-signup-btn" onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-3 py-3 bg-white border-2 border-slate-100 text-slate-700 rounded-2xl font-bold text-sm shadow-sm hover:bg-slate-50 hover:border-slate-200 transition-all active:scale-[0.98]">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                </div>
            </div>
        </div>

        <p class="text-center mt-6 text-slate-400 text-[10px] font-medium">
            By joining, you agree to our <a href="#" class="text-slate-900 font-bold hover:underline">Terms</a>
        </p>
    </div>

    <script>
        // Initialize Supabase
        const supabaseUrl = '{{ config.SUPABASE_URL }}';
        const supabaseKey = '{{ config.SUPABASE_KEY }}';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function signInWithGoogle() {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/api/auth/callback'
                }
            });
            if (error) {
                console.error('Error signing in with Google:', error.message);
                const activeError = document.title.includes('Sign In') ? document.getElementById('login-error') : document.getElementById('signup-error');
                activeError.innerText = 'Google Sign-In failed: ' + error.message;
                activeError.classList.remove('hidden');
            }
        }

        const panels = document.getElementById('panels');
        const btnLogin = document.getElementById('btn-login');
        const btnRegister = document.getElementById('btn-register');

        function switchPanel(mode) {
            if (mode === 'login') {
                panels.style.transform = 'translateX(0%)';
                btnLogin.className = 'flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 auth-toggle-active';
                btnRegister.className = 'flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 text-slate-600';
                document.title = "Sign In - Unibot.AI";
                if (window.location.pathname.includes('signup')) window.history.pushState({}, '', '/login');
            } else {
                panels.style.transform = 'translateX(-100%)';
                btnRegister.className = 'flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 auth-toggle-active';
                btnLogin.className = 'flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all duration-300 text-slate-600';
                if (!window.location.pathname.includes('signup')) window.history.pushState({}, '', '/signup');
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            if (window.location.pathname.includes('signup')) switchPanel('register');
        });

        // Forms logic...
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = 'Signing in...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) { window.location.href = data.role === 'admin' ? '/admin' : '/chat'; }
                else { 
                    errorMsg.innerText = data.error || 'Login failed'; 
                    errorMsg.classList.remove('hidden'); 
                    btn.disabled = false; btn.innerText = 'Sign In';
                }
            } catch (err) { 
                errorMsg.innerText = 'Error connecting to server'; 
                errorMsg.classList.remove('hidden'); 
                btn.disabled = false; btn.innerText = 'Sign In';
            }
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const errorMsg = document.getElementById('signup-error');
            const btn = e.target.querySelector('button');

            if (password !== confirm) { errorMsg.innerText = 'Passwords not matching'; errorMsg.classList.remove('hidden'); return; }
            
            btn.disabled = true; btn.innerText = 'Creating account...';
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) { window.location.href = '/chat'; }
                else { 
                    errorMsg.innerText = data.error || 'Signup failed'; 
                    errorMsg.classList.remove('hidden'); 
                    btn.disabled = false; btn.innerText = 'Create Account';
                }
            } catch (err) { 
                errorMsg.innerText = 'Error connecting to server'; 
                errorMsg.classList.remove('hidden'); 
                btn.disabled = false; btn.innerText = 'Create Account';
            }
        });
    </script>
</body>

</html>
